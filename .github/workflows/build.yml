name: Pre-merge checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ['main']

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and test (OS ${{ matrix.os }}, JDK ${{ matrix.java-version }})
    timeout-minutes: 30
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        java-version: [21]
        os: [ubuntu-latest]

    env:
      JDK_VERSION: ${{ matrix.java-version }}
      GRADLE_OPTS: -Dorg.gradle.daemon=false

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Ensure all code files have license headers
        if: matrix.os == 'ubuntu-latest' && matrix.java-version == '21'
        shell: bash
        run: ./script/ensure_license_headers.sh

      - name: Setup JDK ${{ matrix.java-version }}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: zulu

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          dependency-graph: generate-and-submit
          dependency-graph-continue-on-failure: false

      - name: Build and test
        shell: bash
        run: ./gradlew check koverLog --parallel --no-daemon -x iosX64Test

      - name: Boot simulator
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          xcrun simctl list
          xcrun simctl boot 'iPhone 16 Pro Max' || true

      - name: Run simulator tests
        if: matrix.os == 'macos-14'
        shell: bash
        run: ./gradlew -PiosDevice="iPhone 16 Pro Max" iosTest
